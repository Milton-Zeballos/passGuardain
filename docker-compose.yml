services:
  # ----------------------------------------
  # Base de Datos: MySQL
  # ----------------------------------------
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mi_app_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 30
      start_period: 180s

  # ----------------------------------------
  # Backend: Django
  # ----------------------------------------
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: django_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_USER=devuser
      - DB_PASSWORD=devpassword
      - DB_NAME=mi_app_db
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------
  # Frontend: React Native (Expo)
  # ----------------------------------------
  mobile:
    build:
      context: ./mobile  # Ajusta esto si tu carpeta se llama 'mobile' o 'front'
      dockerfile: Dockerfile
    container_name: expo_app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    volumes:
      - ./mobile:/app    # Mapea tu código local al contenedor
      - /app/node_modules # Evita que los módulos locales sobreescriban a los del contenedor
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=host.docker.internal
    stdin_open: true # Permite interacción con la terminal si es necesario
    tty: true

  # ----------------------------------------
  # phpMyAdmin
  # ----------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: